<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSS - Enterprise Data Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation Bar -->
        <nav class="top-nav">
            <div class="nav-left">
                <span class="portal-name">OSS</span>
                <span class="portal-badge">Enterprise</span>
            </div>
            
            <div class="nav-right">
                <div class="user-profile">
                    <span class="user-greeting">Welcome back,</span>
                    <span class="user-id" id="userId">OPERATOR_001</span>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Page Header -->
            <div class="page-header">
                <h1 class="page-title">Applications</h1>
                <p class="page-subtitle">Select an application to start working</p>
            </div>

            <!-- Search Section -->
            <div class="search-wrapper">
                <div class="search-box">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input 
                        type="text" 
                        id="appSearch" 
                        placeholder="Search applications by name or description..."
                        class="search-input"
                    >
                </div>
                <span class="app-count" id="appCount">9 applications</span>
            </div>

            <!-- Applications Grid -->
            <div class="apps-grid" id="appsGrid">
                <!-- Applications will be loaded here -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2026 OSS Enterprise. All rights reserved.</p>
            <p>Version 2.0.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
